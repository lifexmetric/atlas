---
# Allow fraud-detection-service to receive traffic from kafka (consumer; no HTTP ingress needed)
# and to reach kafka and neo4j
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fraud-detection-service-egress
  namespace: banking-system
spec:
  podSelector:
    matchLabels:
      app: fraud-detection-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: neo4j
      ports:
        - port: 7687

