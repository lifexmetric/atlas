# NetworkPolicy definitions for the banking-system namespace.
# Default posture: deny all inter-pod traffic, then selectively allow.
# Each policy targets a specific workload as the traffic destination.

---
# Deny all ingress/egress by default across the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: banking-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow external ingress to api-gateway on port 3000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api-gateway
  namespace: banking-system
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 3000

---
# Allow api-gateway to reach downstream services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-egress
  namespace: banking-system
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
    - to:
        - podSelector:
            matchLabels:
              app: accounts-service
    - to:
        - podSelector:
            matchLabels:
              app: payments-service
    - to:
        - podSelector:
            matchLabels:
              app: customer-service
    - to:
        - podSelector:
            matchLabels:
              app: reporting-service

---
# Allow auth-service to receive traffic from api-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-auth-service
  namespace: banking-system
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway

---
# Allow auth-service to reach postgres-auth and redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service-egress
  namespace: banking-system
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres-auth
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379

---
# Allow accounts-service to receive traffic from api-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-accounts-service
  namespace: banking-system
