server:
  port: 8002

spring:
  application:
    name: accounts-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_BANK_HOST:localhost}:${POSTGRES_BANK_PORT:5433}/${POSTGRES_BANK_DB:bank_db}
    username: ${POSTGRES_BANK_USER:bank_user}
    password: ${POSTGRES_BANK_PASSWORD:bank_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

kafka:
  topics:
    account-updated: ${KAFKA_TOPIC_ACCOUNT_UPDATED:account.updated}

management:
  endpoints:
    web:
      exposure:
        include: health,info
